services:
  server:
    build:
      context: ./Docker/server
      dockerfile: Dockerfile
    restart: always
    tty: true
    environment:
      MYSQL_HOST: db
      MYSQL_USER: myuser
      MYSQL_PASSWORD: mypassword
      MYSQL_NAME: mydatabase
      MYSQL_PORT: 3306
    volumes:
      - ./:/workspace
    working_dir: /workspace
    depends_on:
      - db
    networks:
      - axum_ddd_rust_network

  db:
    build:
      context: ./Docker/mysql
      dockerfile: Dockerfile
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: mydatabase
      MYSQL_USER: myuser
      MYSQL_PASSWORD: mypassword
    ports:
      - "3309:3306"
    volumes:
      - ./Docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - axum_ddd_rust_network

networks:
  axum_ddd_rust_network:
    driver: bridge